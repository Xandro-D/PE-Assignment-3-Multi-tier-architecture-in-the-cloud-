<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notetaker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav id="navbar" class="navbar navbar-dark bg-dark sticky-top" style="display: none;">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">📝 Notetaker</span>
            <div class="d-flex align-items-center">
                <span class="text-light me-3">@<span id="usernameDisplay"></span></span>
                <button class="btn btn-outline-light" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Auth Container -->
    <div id="authContainer" class="auth-container">
        <div class="auth-box">
            <h2 id="authTitle">Login</h2>
            <div id="authMessage" class="alert alert-danger" style="display: none;"></div>
            
            <form id="authForm" onsubmit="handleAuthSubmit(event)">
                <input type="text" id="authUsername" class="form-control mb-3" placeholder="Username" required>
                <input type="password" id="authPassword" class="form-control mb-3" placeholder="Password" required>
                <input type="password" id="authConfirmPassword" class="form-control mb-3" placeholder="Confirm Password" style="display: none;">
                
                <button type="submit" class="btn btn-primary w-100 mb-3" id="authSubmitBtn">Login</button>
            </form>
            
            <p class="text-center text-muted">
                <span id="authToggleText">Don't have an account?</span>
                <a href="#" id="authToggleLink" onclick="toggleAuthMode(event)" class="text-primary">Register here</a>
            </p>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="appContainer" style="display: none;">
        <!-- Notes List View -->
        <div id="notesListView">
            <div class="container my-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>My Notes</h2>
                    <button class="btn btn-primary" onclick="showCreateNoteView()">+ New Note</button>
                </div>
                
                <div id="notesMessage" class="alert" style="display: none;"></div>
                <div id="notesLoadingSpinner" class="text-center" style="display: none;">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
                
                <div id="notesGrid" class="row"></div>
            </div>
        </div>

        <!-- Create Note View -->
        <div id="createNoteView" style="display: none;">
            <div class="container my-5">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-body">
                                <h2 class="card-title mb-4">Create New Note</h2>
                                
                                <div id="createNoteMessage" class="alert" style="display: none;"></div>
                                
                                <form id="createNoteForm" onsubmit="handleCreateNote(event)">
                                    <div class="mb-3">
                                        <label class="form-label">Title</label>
                                        <input type="text" id="createNoteTitle" class="form-control" placeholder="Enter note title" required>
                                    </div>
                                    
                                    <div class="mb-4">
                                        <label class="form-label">Content</label>
                                        <textarea id="createNoteContent" class="form-control" rows="10" placeholder="Enter note content" required></textarea>
                                    </div>
                                    
                                    <div class="d-flex gap-2">
                                        <button type="submit" class="btn btn-primary">Create Note</button>
                                        <button type="button" class="btn btn-secondary" onclick="showNotesListView()">Cancel</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Note View -->
        <div id="editNoteView" style="display: none;">
            <div class="container my-5">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-body">
                                <h2 class="card-title mb-4">Edit Note</h2>
                                
                                <div id="editNoteMessage" class="alert" style="display: none;"></div>
                                
                                <form id="editNoteForm" onsubmit="handleEditNote(event)">
                                    <div class="mb-3">
                                        <label class="form-label">Title</label>
                                        <input type="text" id="editNoteTitle" class="form-control" placeholder="Enter note title" required>
                                    </div>
                                    
                                    <div class="mb-4">
                                        <label class="form-label">Content</label>
                                        <textarea id="editNoteContent" class="form-control" rows="10" placeholder="Enter note content" required></textarea>
                                    </div>
                                    
                                    <div class="d-flex gap-2">
                                        <button type="submit" class="btn btn-primary">Save Changes</button>
                                        <button type="button" class="btn btn-secondary" onclick="showNotesListView()">Cancel</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
